name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Operational CLI smoke test
        run: |
          beacon-ops validate --input data/operational/example_score.csv
          beacon-ops validate --input data/operational/example_train.csv --require-label

          beacon-ops score \
            --input data/operational/example_score.csv \
            --input-format normalized-csv \
            --output-dir results/operational/ci_rules
          test -f results/operational/ci_rules/alerts.csv
          test -f results/operational/ci_rules/scored_flows.csv
          test -f results/operational/ci_rules/run_summary.json
          test -f results/operational/ci_rules/report.md

          beacon-ops score \
            --input data/operational/fixtures/netflow_unsupported_protocol.csv \
            --input-format netflow-ipfix-csv \
            --output-dir results/operational/ci_netflow
          test -f results/operational/ci_netflow/run_summary.json
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(
              Path("results/operational/ci_netflow/run_summary.json").read_text()
          )
          assert summary["ingestion"]["input_row_count"] == 2
          assert summary["ingestion"]["skipped_row_count"] == 1
          assert summary["ingestion"]["skipped_row_reasons"] == {
              "unsupported_protocol": 1
          }
          PY

          beacon-ops train-model \
            --train data/operational/example_train.csv \
            --output-dir models/operational/ci_rf
          test -f models/operational/ci_rf/model.pkl
          test -f models/operational/ci_rf/artifact_manifest.json

          beacon-ops score \
            --input data/operational/example_score.csv \
            --input-format normalized-csv \
            --model-artifact models/operational/ci_rf \
            --profile balanced \
            --output-dir results/operational/ci_hybrid
          test -f results/operational/ci_hybrid/alerts.csv
          test -f results/operational/ci_hybrid/scored_flows.csv
          test -f results/operational/ci_hybrid/run_summary.json
          test -f results/operational/ci_hybrid/report.md
